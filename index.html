<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-do — Les Meubles du Cœur</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F2EC;
    --card: #FDFAF5;
    --text: #1A1714;
    --muted: #8C8479;
    --accent: #C45C3A;
    --accent-light: #F5E8E2;
    --border: #E0D9CE;
    --done-text: #B5AEA6;
    --green: #4A7C59;
    --green-light: #E8F2EB;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  header {
    max-width: 640px;
    margin: 0 auto 2.5rem;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    color: var(--text);
    line-height: 1.2;
  }

  header p {
    margin-top: 0.4rem;
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
  }

  .progress-bar-wrap {
    margin-top: 1rem;
    background: var(--border);
    border-radius: 99px;
    height: 4px;
    overflow: hidden;
  }

  .progress-bar {
    height: 4px;
    background: var(--accent);
    border-radius: 99px;
    width: 0%;
    transition: width 0.4s ease;
  }

  .progress-label {
    margin-top: 0.4rem;
    font-size: 12px;
    color: var(--muted);
  }

  .main { max-width: 640px; margin: 0 auto; }

  .section { margin-bottom: 2rem; }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
    padding-left: 2px;
  }

  .group {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 0.75rem;
    overflow: hidden;
  }

  .group-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    padding: 0.75rem 1rem 0.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0.65rem 1rem;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    position: relative;
  }

  .task-item:last-of-type { border-bottom: none; }
  .task-item:hover { background: #F8F4ED; }

  .task-item input[type="checkbox"] {
    appearance: none;
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 5px;
    flex-shrink: 0;
    cursor: pointer;
    transition: all 0.2s;
    background: white;
    position: relative;
  }

  .task-item input[type="checkbox"]:checked {
    background: var(--green);
    border-color: var(--green);
  }

  .task-item input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 4px;
    top: 1px;
    width: 6px;
    height: 10px;
    border: 2px solid white;
    border-top: none;
    border-left: none;
    transform: rotate(45deg);
  }

  .task-text {
    font-size: 14px;
    color: var(--text);
    flex: 1;
    line-height: 1.4;
    transition: color 0.2s;
  }

  .task-item input:checked ~ .task-text {
    color: var(--done-text);
    text-decoration: line-through;
  }

  .delete-btn {
    opacity: 0;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 16px;
    padding: 2px 4px;
    border-radius: 4px;
    transition: opacity 0.15s, color 0.15s;
    line-height: 1;
  }

  .task-item:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: var(--accent); }

  .add-task-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0.5rem 1rem 0.6rem;
    border-top: 1px dashed var(--border);
  }

  .add-task-input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
  }

  .add-task-input::placeholder { color: var(--muted); }

  .add-task-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--accent);
    font-size: 20px;
    line-height: 1;
    padding: 0 2px;
    transition: transform 0.15s;
  }

  .add-task-btn:hover { transform: scale(1.2); }

  .add-group-wrap {
    margin-top: 1rem;
  }

  .add-group-input {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 0.65rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--muted);
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .add-group-input:focus {
    border-color: var(--accent);
    color: var(--text);
  }

  .add-group-row {
    display: flex;
    gap: 8px;
    margin-top: 0.5rem;
  }

  .add-group-name {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.75rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    background: white;
    color: var(--text);
  }

  .btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.5rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn:hover { opacity: 0.85; }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .hidden { display: none; }

  footer {
    max-width: 640px;
    margin: 2rem auto 0;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>Les Meubles du Cœur</h1>
  <p>Les tâches sont sauvegardées automatiquement dans ton navigateur.</p>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <p class="progress-label" id="progressLabel">0 tâche complétée</p>
</header>

<div class="main" id="main"></div>

<footer>Sauvegarde locale automatique — aucune donnée envoyée en ligne.</footer>

<script>
const DEFAULT_DATA = [
  {
    section: "Contacts & rendez-vous",
    groups: [
      {
        title: "Répondre aux formateurs",
        tasks: [
          "Consulter les mails sur info@lesmeublesducoeur",
          "Répondre en proposant un rendez-vous + demander leur numéro",
          "Fixer 1 à 2 rendez-vous cette semaine"
        ]
      },
      {
        title: "Trouver des garnisseurs / artisans",
        tasks: [
          "Chercher sur Facebook (restauration meubles, artisans Belgique)",
          "Chercher sur LinkedIn",
          "Regarder les petites annonces (2ememain, etc.)",
          "Poster un message de recherche"
        ]
      }
    ]
  },
  {
    section: "Visibilité physique",
    groups: [
      {
        title: "Cartes de visite",
        tasks: [
          "Trouver un imprimeur",
          "Commander 300 exemplaires"
        ]
      },
      {
        title: "Affiches A3",
        tasks: [
          "Créer l'affiche (même identité que la carte de visite)",
          "Imprimer 20 exemplaires",
          "Déposer dans les communes, hôpitaux, CPAS et commerces locaux"
        ]
      },
      {
        title: "Prix des livres (bibliothèque café)",
        tasks: [
          "Choisir un système simple — ex : 4 couleurs de gommettes (1€ / 3€ / 5€ / 10€)",
          "Acheter les gommettes",
          "Trier les livres et coller les prix"
        ]
      }
    ]
  },
  {
    section: "Ventes en ligne",
    groups: [
      {
        title: "Meubles marbre / design",
        tasks: [
          "Reprendre le texte et les photos des annonces Facebook",
          "Publier sur 2ememain",
          "Publier sur une plateforme design/vintage (Selency, Design Market…)"
        ]
      }
    ]
  },
  {
    section: "Communication ateliers",
    groups: [
      {
        title: "Refaire les photos + republier",
        tasks: [
          "Photographier les bureaux, ateliers et ambiance générale",
          "Publier sur Facebook, Instagram et groupes locaux"
        ]
      },
      {
        title: "Mini affiches A5",
        tasks: [
          "Créer des petites affiches pour la bibliothèque café et les événements"
        ]
      }
    ]
  }
];

function loadData() {
  try {
    const saved = localStorage.getItem('meubles_todo');
    return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_DATA));
  } catch { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}

function saveData(data) {
  localStorage.setItem('meubles_todo', JSON.stringify(data));
}

let data = loadData();

function uid() { return Math.random().toString(36).slice(2, 9); }

function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  data.forEach((section, si) => {
    const secEl = document.createElement('div');
    secEl.className = 'section';

    const label = document.createElement('div');
    label.className = 'section-label';
    label.textContent = section.section;
    secEl.appendChild(label);

    section.groups.forEach((group, gi) => {
      const groupEl = document.createElement('div');
      groupEl.className = 'group';

      const titleEl = document.createElement('div');
      titleEl.className = 'group-title';
      titleEl.textContent = group.title;
      groupEl.appendChild(titleEl);

      (group.tasks || []).forEach((task, ti) => {
        const row = makeTaskRow(task.text || task, task.done || false, si, gi, ti);
        groupEl.appendChild(row);
      });

      // Add task row
      const addRow = document.createElement('div');
      addRow.className = 'add-task-row';
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'add-task-input';
      inp.placeholder = 'Ajouter une tâche...';
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter' && inp.value.trim()) {
          addTask(si, gi, inp.value.trim());
          inp.value = '';
        }
      });
      const addBtn = document.createElement('button');
      addBtn.className = 'add-task-btn';
      addBtn.textContent = '+';
      addBtn.title = 'Ajouter';
      addBtn.onclick = () => {
        if (inp.value.trim()) { addTask(si, gi, inp.value.trim()); inp.value = ''; }
        else inp.focus();
      };
      addRow.appendChild(inp);
      addRow.appendChild(addBtn);
      groupEl.appendChild(addRow);

      secEl.appendChild(groupEl);
    });

    // Add group
    const addGroupWrap = document.createElement('div');
    addGroupWrap.className = 'add-group-wrap';
    const addGroupInput = document.createElement('input');
    addGroupInput.type = 'text';
    addGroupInput.className = 'add-group-input';
    addGroupInput.placeholder = '+ Nouveau groupe dans cette section';
    let confirmRow = null;
    addGroupInput.addEventListener('focus', () => {
      if (!confirmRow) {
        confirmRow = document.createElement('div');
        confirmRow.className = 'add-group-row';
        const nameInp = document.createElement('input');
        nameInp.type = 'text';
        nameInp.className = 'add-group-name';
        nameInp.placeholder = 'Nom du groupe';
        nameInp.value = addGroupInput.value;
        const okBtn = document.createElement('button');
        okBtn.className = 'btn';
        okBtn.textContent = 'Ajouter';
        okBtn.onclick = () => {
          if (nameInp.value.trim()) addGroup(si, nameInp.value.trim());
        };
        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'btn btn-ghost';
        cancelBtn.textContent = 'Annuler';
        cancelBtn.onclick = () => render();
        confirmRow.appendChild(nameInp);
        confirmRow.appendChild(okBtn);
        confirmRow.appendChild(cancelBtn);
        addGroupWrap.appendChild(confirmRow);
        nameInp.focus();
      }
    });
    addGroupWrap.appendChild(addGroupInput);
    secEl.appendChild(addGroupWrap);

    main.appendChild(secEl);
  });

  updateProgress();
}

function makeTaskRow(text, done, si, gi, ti) {
  const row = document.createElement('div');
  row.className = 'task-item';

  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = done;
  cb.addEventListener('change', () => {
    data[si].groups[gi].tasks[ti] = { text, done: cb.checked };
    saveData(data);
    updateProgress();
  });

  const label = document.createElement('span');
  label.className = 'task-text';
  label.textContent = text;

  const del = document.createElement('button');
  del.className = 'delete-btn';
  del.textContent = '×';
  del.title = 'Supprimer';
  del.onclick = () => {
    data[si].groups[gi].tasks.splice(ti, 1);
    saveData(data);
    render();
  };

  row.appendChild(cb);
  row.appendChild(label);
  row.appendChild(del);
  return row;
}

function addTask(si, gi, text) {
  data[si].groups[gi].tasks.push({ text, done: false });
  saveData(data);
  render();
}

function addGroup(si, name) {
  data[si].groups.push({ title: name, tasks: [] });
  saveData(data);
  render();
}

function updateProgress() {
  let total = 0, done = 0;
  data.forEach(s => s.groups.forEach(g => g.tasks.forEach(t => {
    total++;
    if (t.done) done++;
  })));
  const pct = total === 0 ? 0 : Math.round(done / total * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent =
    done === 0 ? '0 tâche complétée'
    : done === total ? 'Tout est fait ! 🎉'
    : done + ' / ' + total + ' tâches complétées';
}

// Normalize old data (strings -> objects)
data.forEach(s => s.groups.forEach(g => {
  g.tasks = (g.tasks || []).map(t => typeof t === 'string' ? { text: t, done: false } : t);
}));

render();
</script>
</body>
</html>
