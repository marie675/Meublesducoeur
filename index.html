<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-do — Les Meubles du Cœur</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F5F2EC;
    --card: #FDFAF5;
    --text: #1A1714;
    --muted: #8C8479;
    --accent: #C45C3A;
    --border: #E0D9CE;
    --done-text: #B5AEA6;
    --green: #4A7C59;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem 4rem; }

  header { max-width: 640px; margin: 0 auto 2rem; }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 2rem; font-weight: 400; }
  header p { margin-top: 0.3rem; font-size: 13px; color: var(--muted); font-weight: 300; }

  .progress-bar-wrap { margin-top: 1rem; background: var(--border); border-radius: 99px; height: 4px; overflow: hidden; }
  .progress-bar { height: 4px; background: var(--accent); border-radius: 99px; width: 0%; transition: width 0.4s ease; }
  .progress-label { margin-top: 0.4rem; font-size: 12px; color: var(--muted); }

  .save-banner {
    max-width: 640px;
    margin: 0 auto 1.5rem;
    background: #FFF8E7;
    border: 1px solid #F0D88A;
    border-radius: 10px;
    padding: 0.75rem 1rem;
    font-size: 13px;
    color: #7A6000;
    display: none;
    align-items: center;
    gap: 10px;
  }
  .save-banner.visible { display: flex; }
  .save-btn {
    margin-left: auto;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 7px;
    padding: 0.4rem 0.9rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }
  .save-btn:hover { opacity: 0.85; }

  .copy-banner {
    max-width: 640px;
    margin: 0 auto 1.5rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    font-size: 13px;
    color: var(--muted);
    display: none;
    align-items: center;
    gap: 10px;
  }
  .copy-banner.visible { display: flex; }
  .copy-url {
    flex: 1;
    font-size: 12px;
    color: var(--accent);
    word-break: break-all;
    font-family: monospace;
  }
  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 0.35rem 0.75rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    color: var(--text);
    white-space: nowrap;
  }
  .copy-btn:hover { background: var(--border); }

  .main { max-width: 640px; margin: 0 auto; }
  .section { margin-bottom: 2rem; }
  .section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; padding-left: 2px; }

  .group { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 0.75rem; overflow: hidden; }
  .group-title { font-size: 13px; font-weight: 500; color: var(--muted); padding: 0.75rem 1rem 0.5rem; border-bottom: 1px solid var(--border); }

  .task-item { display: flex; align-items: center; gap: 12px; padding: 0.65rem 1rem; border-bottom: 1px solid var(--border); transition: background 0.15s; }
  .task-item:last-of-type { border-bottom: none; }
  .task-item:hover { background: #F8F4ED; }

  .task-item input[type="checkbox"] {
    appearance: none; width: 18px; height: 18px; border: 1.5px solid var(--border);
    border-radius: 5px; flex-shrink: 0; cursor: pointer; transition: all 0.2s;
    background: white; position: relative;
  }
  .task-item input[type="checkbox"]:checked { background: var(--green); border-color: var(--green); }
  .task-item input[type="checkbox"]:checked::after {
    content: ''; position: absolute; left: 4px; top: 1px;
    width: 6px; height: 10px; border: 2px solid white;
    border-top: none; border-left: none; transform: rotate(45deg);
  }

  .task-text { font-size: 14px; color: var(--text); flex: 1; line-height: 1.4; transition: color 0.2s; }
  .task-item input:checked ~ .task-text { color: var(--done-text); text-decoration: line-through; }

  .delete-btn { opacity: 0; background: none; border: none; cursor: pointer; color: var(--muted); font-size: 18px; padding: 2px 4px; border-radius: 4px; transition: opacity 0.15s, color 0.15s; line-height: 1; }
  .task-item:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: var(--accent); }

  .add-task-row { display: flex; align-items: center; gap: 8px; padding: 0.5rem 1rem 0.6rem; border-top: 1px dashed var(--border); }
  .add-task-input { flex: 1; border: none; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); outline: none; }
  .add-task-input::placeholder { color: var(--muted); }
  .add-task-btn { background: none; border: none; cursor: pointer; color: var(--accent); font-size: 20px; line-height: 1; padding: 0 2px; transition: transform 0.15s; }
  .add-task-btn:hover { transform: scale(1.2); }

  footer { max-width: 640px; margin: 2rem auto 0; font-size: 11px; color: var(--muted); text-align: center; }
</style>
</head>
<body>

<header>
  <h1>Les Meubles du Cœur</h1>
  <p>Coche des tâches, puis clique "Sauvegarder le lien" pour bookmarker ta progression.</p>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <p class="progress-label" id="progressLabel">0 tâche complétée</p>
</header>

<div class="save-banner visible" id="saveBanner">
  📌 Pense à sauvegarder le lien après chaque session !
  <button class="save-btn" onclick="saveToUrl()">Sauvegarder le lien</button>
</div>

<div class="copy-banner" id="copyBanner">
  <span class="copy-url" id="copyUrl"></span>
  <button class="copy-btn" id="copyBtn" onclick="copyUrl()">Copier</button>
</div>

<div class="main" id="main"></div>

<footer>Les données sont encodées dans le lien — bookmarke-le pour retrouver ta progression.</footer>

<script>
const DEFAULT_DATA = [
  {
    section: "Contacts & rendez-vous",
    groups: [
      { title: "Répondre aux formateurs", tasks: [
        { text: "Consulter les mails sur info@lesmeublesducoeur", done: false },
        { text: "Répondre en proposant un rendez-vous + demander leur numéro", done: false },
        { text: "Fixer 1 à 2 rendez-vous cette semaine", done: false }
      ]},
      { title: "Trouver des garnisseurs / artisans", tasks: [
        { text: "Chercher sur Facebook (restauration meubles, artisans Belgique)", done: false },
        { text: "Chercher sur LinkedIn", done: false },
        { text: "Regarder les petites annonces (2ememain, etc.)", done: false },
        { text: "Poster un message de recherche", done: false }
      ]}
    ]
  },
  {
    section: "Visibilité physique",
    groups: [
      { title: "Cartes de visite", tasks: [
        { text: "Trouver un imprimeur", done: false },
        { text: "Commander 300 exemplaires", done: false }
      ]},
      { title: "Affiches A3", tasks: [
        { text: "Créer l'affiche (même identité que la carte de visite)", done: false },
        { text: "Imprimer 20 exemplaires", done: false },
        { text: "Déposer dans les communes, hôpitaux, CPAS et commerces locaux", done: false }
      ]},
      { title: "Prix des livres (bibliothèque café)", tasks: [
        { text: "Choisir un système simple — ex : 4 couleurs de gommettes (1€ / 3€ / 5€ / 10€)", done: false },
        { text: "Acheter les gommettes", done: false },
        { text: "Trier les livres et coller les prix", done: false }
      ]}
    ]
  },
  {
    section: "Ventes en ligne",
    groups: [
      { title: "Meubles marbre / design", tasks: [
        { text: "Reprendre le texte et les photos des annonces Facebook", done: false },
        { text: "Publier sur 2ememain", done: false },
        { text: "Publier sur une plateforme design/vintage (Selency, Design Market…)", done: false }
      ]}
    ]
  },
  {
    section: "Communication ateliers",
    groups: [
      { title: "Refaire les photos + republier", tasks: [
        { text: "Photographier les bureaux, ateliers et ambiance générale", done: false },
        { text: "Publier sur Facebook, Instagram et groupes locaux", done: false }
      ]},
      { title: "Mini affiches A5", tasks: [
        { text: "Créer des petites affiches pour la bibliothèque café et les événements", done: false }
      ]}
    ]
  }
];

let data;

function loadFromUrl() {
  try {
    const hash = window.location.hash.slice(1);
    if (hash) {
      const decoded = decodeURIComponent(hash);
      const parsed = JSON.parse(atob(decoded));
      return parsed;
    }
  } catch(e) {}
  return null;
}

function saveToUrl() {
  const encoded = btoa(encodeURIComponent(JSON.stringify(data)));
  const url = window.location.href.split('#')[0] + '#' + encoded;
  window.location.hash = encoded;
  document.getElementById('copyUrl').textContent = url;
  document.getElementById('copyBanner').classList.add('visible');
  document.getElementById('copyBtn').textContent = 'Copier';
}

function copyUrl() {
  const url = document.getElementById('copyUrl').textContent;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copié !';
    setTimeout(() => btn.textContent = 'Copier', 2000);
  });
}

function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  data.forEach((section, si) => {
    const secEl = document.createElement('div');
    secEl.className = 'section';

    const label = document.createElement('div');
    label.className = 'section-label';
    label.textContent = section.section;
    secEl.appendChild(label);

    section.groups.forEach((group, gi) => {
      const groupEl = document.createElement('div');
      groupEl.className = 'group';

      const titleEl = document.createElement('div');
      titleEl.className = 'group-title';
      titleEl.textContent = group.title;
      groupEl.appendChild(titleEl);

      group.tasks.forEach((task, ti) => {
        groupEl.appendChild(makeTaskRow(task, si, gi, ti));
      });

      const addRow = document.createElement('div');
      addRow.className = 'add-task-row';
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'add-task-input';
      inp.placeholder = 'Ajouter une tâche...';
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter' && inp.value.trim()) {
          data[si].groups[gi].tasks.push({ text: inp.value.trim(), done: false });
          inp.value = '';
          render();
        }
      });
      const addBtn = document.createElement('button');
      addBtn.className = 'add-task-btn';
      addBtn.textContent = '+';
      addBtn.onclick = () => {
        if (inp.value.trim()) {
          data[si].groups[gi].tasks.push({ text: inp.value.trim(), done: false });
          inp.value = '';
          render();
        } else inp.focus();
      };
      addRow.appendChild(inp);
      addRow.appendChild(addBtn);
      groupEl.appendChild(addRow);
      secEl.appendChild(groupEl);
    });

    main.appendChild(secEl);
  });

  updateProgress();
}

function makeTaskRow(task, si, gi, ti) {
  const row = document.createElement('div');
  row.className = 'task-item';

  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = task.done;
  cb.addEventListener('change', () => {
    data[si].groups[gi].tasks[ti].done = cb.checked;
    updateProgress();
    document.getElementById('saveBanner').classList.add('visible');
  });

  const label = document.createElement('span');
  label.className = 'task-text';
  label.textContent = task.text;

  const del = document.createElement('button');
  del.className = 'delete-btn';
  del.textContent = '×';
  del.onclick = () => {
    data[si].groups[gi].tasks.splice(ti, 1);
    render();
  };

  row.appendChild(cb);
  row.appendChild(label);
  row.appendChild(del);
  return row;
}

function updateProgress() {
  let total = 0, done = 0;
  data.forEach(s => s.groups.forEach(g => g.tasks.forEach(t => { total++; if (t.done) done++; })));
  const pct = total === 0 ? 0 : Math.round(done / total * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent =
    done === 0 ? '0 tâche complétée'
    : done === total ? 'Tout est fait ! 🎉'
    : done + ' / ' + total + ' tâches complétées';
}

data = loadFromUrl() || JSON.parse(JSON.stringify(DEFAULT_DATA));
render();
</script>
</body>
</html>
