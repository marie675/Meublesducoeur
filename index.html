<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-do — Les Meubles du Cœur</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F5F2EC;
    --card: #FDFAF5;
    --text: #1A1714;
    --muted: #8C8479;
    --accent: #C45C3A;
    --border: #E0D9CE;
    --done-text: #B5AEA6;
    --green: #4A7C59;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem 4rem; }

  header { max-width: 640px; margin: 0 auto 2rem; }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 2rem; font-weight: 400; }
  header p { margin-top: 0.3rem; font-size: 13px; color: var(--muted); font-weight: 300; }
  .progress-bar-wrap { margin-top: 1rem; background: var(--border); border-radius: 99px; height: 4px; overflow: hidden; }
  .progress-bar { height: 4px; background: var(--accent); border-radius: 99px; width: 0%; transition: width 0.4s ease; }
  .progress-label { margin-top: 0.4rem; font-size: 12px; color: var(--muted); }

  .status { max-width: 640px; margin: 0 auto 1.5rem; font-size: 13px; padding: 0.6rem 1rem; border-radius: 8px; display: none; }
  .status.visible { display: block; }
  .status.saving { background: #FFF8E7; color: #7A6000; border: 1px solid #F0D88A; }
  .status.saved { background: var(--card); color: var(--green); border: 1px solid var(--border); }
  .status.error { background: #FEF0EE; color: #9B2C2C; border: 1px solid #FCA5A5; }
  .status.loading { background: var(--card); color: var(--muted); border: 1px solid var(--border); }

  .main { max-width: 640px; margin: 0 auto; }
  .section { margin-bottom: 2.5rem; }

  .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 0.75rem; }
  .section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); flex: 1; padding-left: 2px; }
  .section-delete-btn { opacity: 0; background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; padding: 2px 5px; border-radius: 4px; transition: opacity 0.15s, color 0.15s; line-height: 1; }
  .section-header:hover .section-delete-btn { opacity: 1; }
  .section-delete-btn:hover { color: var(--accent); }

  .group { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 0.75rem; overflow: hidden; }
  .group-header { display: flex; align-items: center; padding: 0.75rem 1rem 0.5rem; border-bottom: 1px solid var(--border); gap: 8px; }
  .group-title { font-size: 13px; font-weight: 500; color: var(--muted); flex: 1; }
  .group-delete-btn { opacity: 0; background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; padding: 2px 5px; border-radius: 4px; transition: opacity 0.15s, color 0.15s; line-height: 1; }
  .group-header:hover .group-delete-btn { opacity: 1; }
  .group-delete-btn:hover { color: var(--accent); }

  .task-item { display: flex; align-items: center; gap: 12px; padding: 0.65rem 1rem; border-bottom: 1px solid var(--border); transition: background 0.15s; }
  .task-item:last-of-type { border-bottom: none; }
  .task-item:hover { background: #F8F4ED; }
  .task-item input[type="checkbox"] { appearance: none; width: 18px; height: 18px; border: 1.5px solid var(--border); border-radius: 5px; flex-shrink: 0; cursor: pointer; transition: all 0.2s; background: white; position: relative; }
  .task-item input[type="checkbox"]:checked { background: var(--green); border-color: var(--green); }
  .task-item input[type="checkbox"]:checked::after { content: ''; position: absolute; left: 4px; top: 1px; width: 6px; height: 10px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg); }
  .task-text { font-size: 14px; color: var(--text); flex: 1; line-height: 1.4; }
  .task-item input:checked ~ .task-text { color: var(--done-text); text-decoration: line-through; }
  .delete-btn { opacity: 0; background: none; border: none; cursor: pointer; color: var(--muted); font-size: 18px; padding: 2px 4px; border-radius: 4px; transition: opacity 0.15s, color 0.15s; line-height: 1; }
  .task-item:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: var(--accent); }

  .add-task-row { display: flex; align-items: center; gap: 8px; padding: 0.5rem 1rem 0.6rem; border-top: 1px dashed var(--border); }
  .add-task-input { flex: 1; border: none; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); outline: none; }
  .add-task-input::placeholder { color: var(--muted); }
  .add-task-btn { background: none; border: none; cursor: pointer; color: var(--accent); font-size: 20px; line-height: 1; padding: 0 2px; transition: transform 0.15s; }
  .add-task-btn:hover { transform: scale(1.2); }

  .add-group-row { display: flex; align-items: center; gap: 8px; margin-bottom: 0.75rem; }
  .add-group-input { flex: 1; border: 1px dashed var(--border); border-radius: 10px; padding: 0.55rem 1rem; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); background: transparent; outline: none; transition: border-color 0.2s; }
  .add-group-input::placeholder { color: var(--muted); }
  .add-group-input:focus { border-color: var(--accent); }
  .add-group-btn { background: none; border: none; cursor: pointer; color: var(--accent); font-size: 20px; line-height: 1; padding: 0 4px; transition: transform 0.15s; }
  .add-group-btn:hover { transform: scale(1.2); }

  .add-section-wrap { max-width: 640px; margin: 0.5rem auto 1rem; }
  .add-section-row { display: flex; align-items: center; gap: 8px; }
  .add-section-input { flex: 1; border: 1px dashed var(--border); border-radius: 10px; padding: 0.65rem 1rem; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); background: transparent; outline: none; transition: border-color 0.2s; }
  .add-section-input::placeholder { color: var(--muted); }
  .add-section-input:focus { border-color: var(--accent); }
  .add-section-btn { background: none; border: none; cursor: pointer; color: var(--accent); font-size: 22px; line-height: 1; padding: 0 4px; transition: transform 0.15s; }
  .add-section-btn:hover { transform: scale(1.2); }

  .spinner { display: inline-block; width: 10px; height: 10px; border: 2px solid var(--muted); border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer { max-width: 640px; margin: 2rem auto 0; font-size: 11px; color: var(--muted); text-align: center; }
</style>
</head>
<body>

<header>
  <h1>Les Meubles du Cœur</h1>
  <p>Les modifications sont sauvegardées automatiquement.</p>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <p class="progress-label" id="progressLabel">Chargement...</p>
</header>

<div class="status loading visible" id="status"><span class="spinner"></span> Chargement des données...</div>
<div class="main" id="main"></div>

<div class="add-section-wrap">
  <div class="add-section-row">
    <input type="text" class="add-section-input" id="newSectionInput" placeholder="+ Nouvelle section..." />
    <button class="add-section-btn" onclick="addSection()">+</button>
  </div>
</div>

<footer>Synchronisé en temps réel — accessible depuis n'importe quel appareil.</footer>

<script>
const BIN_ID = '69cbdf5f36566621a86711a0';
const API_KEY = '$2a$10$BsJ6Doo7Lw.GkhCYjr95FuWTAoRyUwD/xApnV7jL7PL82AY/OrC6S';
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

const DEFAULT_DATA = [
  { section: "Contacts & rendez-vous", groups: [
    { title: "Répondre aux formateurs", tasks: [
      { text: "Consulter les mails sur info@lesmeublesducoeur", done: false },
      { text: "Répondre en proposant un rendez-vous + demander leur numéro", done: false },
      { text: "Fixer 1 à 2 rendez-vous cette semaine", done: false }
    ]},
    { title: "Trouver des garnisseurs / artisans", tasks: [
      { text: "Chercher sur Facebook (restauration meubles, artisans Belgique)", done: false },
      { text: "Chercher sur LinkedIn", done: false },
      { text: "Regarder les petites annonces (2ememain, etc.)", done: false },
      { text: "Poster un message de recherche", done: false }
    ]}
  ]},
  { section: "Visibilité physique", groups: [
    { title: "Cartes de visite", tasks: [
      { text: "Trouver un imprimeur", done: false },
      { text: "Commander 300 exemplaires", done: false }
    ]},
    { title: "Affiches A3", tasks: [
      { text: "Créer l'affiche (même identité que la carte de visite)", done: false },
      { text: "Imprimer 20 exemplaires", done: false },
      { text: "Déposer dans les communes, hôpitaux, CPAS et commerces locaux", done: false }
    ]},
    { title: "Prix des livres (bibliothèque café)", tasks: [
      { text: "Choisir un système simple — ex : 4 couleurs de gommettes (1€ / 3€ / 5€ / 10€)", done: false },
      { text: "Acheter les gommettes", done: false },
      { text: "Trier les livres et coller les prix", done: false }
    ]}
  ]},
  { section: "Ventes en ligne", groups: [
    { title: "Meubles marbre / design", tasks: [
      { text: "Reprendre le texte et les photos des annonces Facebook", done: false },
      { text: "Publier sur 2ememain", done: false },
      { text: "Publier sur une plateforme design/vintage (Selency, Design Market…)", done: false }
    ]}
  ]},
  { section: "Communication ateliers", groups: [
    { title: "Refaire les photos + republier", tasks: [
      { text: "Photographier les bureaux, ateliers et ambiance générale", done: false },
      { text: "Publier sur Facebook, Instagram et groupes locaux", done: false }
    ]},
    { title: "Mini affiches A5", tasks: [
      { text: "Créer des petites affiches pour la bibliothèque café et les événements", done: false }
    ]}
  ]}
];

let data = [];
let saveTimeout = null;

function showStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = `status ${type} visible`;
  el.innerHTML = type === 'saving' ? `<span class="spinner"></span> ${msg}` : msg;
}
function hideStatus() { setTimeout(() => document.getElementById('status').classList.remove('visible'), 2000); }

async function loadData() {
  try {
    const res = await fetch(API_URL + '/latest', { headers: { 'X-Master-Key': API_KEY } });
    const json = await res.json();
    const record = json.record;
    if (record && record.sections && record.sections.length > 0) {
      data = record.sections;
    } else {
      data = JSON.parse(JSON.stringify(DEFAULT_DATA));
      await saveData(true);
    }
  } catch(e) {
    data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    showStatus('error', 'Erreur de chargement — mode hors ligne.');
  }
  render();
}

async function saveData(silent = false) {
  if (!silent) showStatus('saving', 'Sauvegarde...');
  try {
    await fetch(API_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
      body: JSON.stringify({ sections: data })
    });
    if (!silent) { showStatus('saved', '✓ Sauvegardé'); hideStatus(); }
  } catch(e) {
    if (!silent) showStatus('error', 'Erreur de sauvegarde.');
  }
}

function scheduleSave() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => saveData(), 800);
}

function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  data.forEach((section, si) => {
    const secEl = document.createElement('div');
    secEl.className = 'section';

    const secHeader = document.createElement('div');
    secHeader.className = 'section-header';
    const secLabel = document.createElement('div');
    secLabel.className = 'section-label';
    secLabel.textContent = section.section;
    const secDel = document.createElement('button');
    secDel.className = 'section-delete-btn';
    secDel.textContent = '×';
    secDel.title = 'Supprimer cette section';
    secDel.onclick = () => {
      if (confirm(`Supprimer la section "${section.section}" et toutes ses tâches ?`)) {
        data.splice(si, 1);
        render();
        scheduleSave();
      }
    };
    secHeader.appendChild(secLabel);
    secHeader.appendChild(secDel);
    secEl.appendChild(secHeader);

    section.groups.forEach((group, gi) => {
      const groupEl = document.createElement('div');
      groupEl.className = 'group';

      const groupHeader = document.createElement('div');
      groupHeader.className = 'group-header';
      const groupTitle = document.createElement('div');
      groupTitle.className = 'group-title';
      groupTitle.textContent = group.title;
      const groupDel = document.createElement('button');
      groupDel.className = 'group-delete-btn';
      groupDel.textContent = '×';
      groupDel.title = 'Supprimer ce groupe';
      groupDel.onclick = () => {
        if (confirm(`Supprimer le groupe "${group.title}" ?`)) {
          data[si].groups.splice(gi, 1);
          render();
          scheduleSave();
        }
      };
      groupHeader.appendChild(groupTitle);
      groupHeader.appendChild(groupDel);
      groupEl.appendChild(groupHeader);

      group.tasks.forEach((task, ti) => {
        groupEl.appendChild(makeTaskRow(task, si, gi, ti));
      });

      const addRow = document.createElement('div');
      addRow.className = 'add-task-row';
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'add-task-input';
      inp.placeholder = 'Ajouter une tâche...';
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter' && inp.value.trim()) {
          data[si].groups[gi].tasks.push({ text: inp.value.trim(), done: false });
          inp.value = ''; render(); scheduleSave();
        }
      });
      const addBtn = document.createElement('button');
      addBtn.className = 'add-task-btn';
      addBtn.textContent = '+';
      addBtn.onclick = () => {
        if (inp.value.trim()) {
          data[si].groups[gi].tasks.push({ text: inp.value.trim(), done: false });
          inp.value = ''; render(); scheduleSave();
        } else inp.focus();
      };
      addRow.appendChild(inp);
      addRow.appendChild(addBtn);
      groupEl.appendChild(addRow);
      secEl.appendChild(groupEl);
    });

    const addGroupRow = document.createElement('div');
    addGroupRow.className = 'add-group-row';
    const groupInp = document.createElement('input');
    groupInp.type = 'text';
    groupInp.className = 'add-group-input';
    groupInp.placeholder = '+ Nouveau groupe...';
    groupInp.addEventListener('keydown', e => {
      if (e.key === 'Enter' && groupInp.value.trim()) {
        data[si].groups.push({ title: groupInp.value.trim(), tasks: [] });
        groupInp.value = ''; render(); scheduleSave();
      }
    });
    const groupBtn = document.createElement('button');
    groupBtn.className = 'add-group-btn';
    groupBtn.textContent = '+';
    groupBtn.onclick = () => {
      if (groupInp.value.trim()) {
        data[si].groups.push({ title: groupInp.value.trim(), tasks: [] });
        groupInp.value = ''; render(); scheduleSave();
      } else groupInp.focus();
    };
    addGroupRow.appendChild(groupInp);
    addGroupRow.appendChild(groupBtn);
    secEl.appendChild(addGroupRow);

    main.appendChild(secEl);
  });

  updateProgress();
  document.getElementById('status').classList.remove('visible');
}

function makeTaskRow(task, si, gi, ti) {
  const row = document.createElement('div');
  row.className = 'task-item';
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = task.done;
  cb.addEventListener('change', () => {
    data[si].groups[gi].tasks[ti].done = cb.checked;
    updateProgress();
    scheduleSave();
  });
  const label = document.createElement('span');
  label.className = 'task-text';
  label.textContent = task.text;
  const del = document.createElement('button');
  del.className = 'delete-btn';
  del.textContent = '×';
  del.onclick = () => {
    data[si].groups[gi].tasks.splice(ti, 1);
    render(); scheduleSave();
  };
  row.appendChild(cb);
  row.appendChild(label);
  row.appendChild(del);
  return row;
}

function addSection() {
  const inp = document.getElementById('newSectionInput');
  if (!inp.value.trim()) { inp.focus(); return; }
  data.push({ section: inp.value.trim(), groups: [] });
  inp.value = ''; render(); scheduleSave();
}

document.getElementById('newSectionInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addSection();
});

function updateProgress() {
  let total = 0, done = 0;
  data.forEach(s => s.groups.forEach(g => g.tasks.forEach(t => { total++; if (t.done) done++; })));
  const pct = total === 0 ? 0 : Math.round(done / total * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent =
    done === 0 ? '0 tâche complétée'
    : done === total ? 'Tout est fait ! 🎉'
    : done + ' / ' + total + ' tâches complétées';
}

loadData();
</script>
</body>
</html>
